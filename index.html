<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SmarterPaw Channel Planner</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel-2: #1e222b; --line: #2a2f3a;
    --text: #e8eaf0; --muted: #9aa3b2; --accent: #6d5dfc;
    --meowi: #6d5dfc; --doggi: #f5a524; --kitty: #ec4899;
    --backlog: #6b7280; --progress: #3b82f6; --review: #a855f7; --scheduled: #f59e0b; --live: #22c55e;
    --danger: #ef4444; --ok: #22c55e;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { background: var(--bg); color: var(--text);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  header { padding: 14px 20px; background: var(--panel); border-bottom: 1px solid var(--line);
    display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
  .brand-title { font-size: 17px; font-weight: 700; letter-spacing: .2px; }
  .brand-title span { color: var(--accent); }
  .status-dot { display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); margin-right:auto; }
  .status-dot .d { width:9px; height:9px; border-radius:50%; background:var(--muted); }
  .status-dot.live .d { background: var(--ok); box-shadow:0 0 6px var(--ok); }
  .status-dot.local .d { background: var(--scheduled); }
  .toolbar, .filters { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  button { font: inherit; cursor: pointer; border: 1px solid var(--line); background: var(--panel-2);
    color: var(--text); padding: 7px 12px; border-radius: 8px; transition: .12s; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  button.ghost { background: transparent; }
  input, select, textarea { font: inherit; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px; padding: 7px 10px; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  .chip { border: 1px solid var(--line); background: var(--panel-2); padding: 5px 11px; border-radius: 999px;
    font-size: 12px; cursor: pointer; user-select: none; display: inline-flex; gap: 6px; align-items: center; }
  .chip .dot { width: 9px; height: 9px; border-radius: 50%; }
  .chip.off { opacity: .4; }
  .search { min-width: 160px; }

  .board { flex: 1; display: flex; gap: 14px; padding: 16px 20px; overflow-x: auto; align-items: flex-start; }
  .col { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    width: 300px; min-width: 300px; max-height: 100%; display: flex; flex-direction: column; }
  .col-head { padding: 12px 14px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--line); }
  .col-head .bar { width: 4px; height: 16px; border-radius: 3px; }
  .col-head h2 { font-size: 13px; margin: 0; font-weight: 700; letter-spacing: .3px; text-transform: uppercase; }
  .col-head .count { margin-left: auto; background: var(--panel-2); color: var(--muted);
    border-radius: 999px; padding: 1px 9px; font-size: 12px; font-weight: 600; }
  .col-body { padding: 10px; overflow-y: auto; flex: 1; min-height: 60px; display: flex; flex-direction: column; gap: 10px; }
  .col-body.drag-over { background: rgba(109,93,252,.08); }
  .card { background: var(--panel-2); border: 1px solid var(--line); border-left-width: 4px;
    border-radius: 10px; padding: 11px 12px; cursor: grab; position: relative; }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: .4; }
  .card .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 7px; }
  .pill { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; color: #fff; }
  .pill.channel { background: var(--panel); color: var(--muted); border: 1px solid var(--line); }
  .card h3 { margin: 0 0 6px; font-size: 14px; font-weight: 600; line-height: 1.3; }
  .card .meta { display: flex; gap: 10px; align-items: center; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
  .card .meta .due.overdue { color: var(--danger); font-weight: 700; }
  .card .notes { margin-top: 7px; font-size: 12px; color: var(--muted); white-space: pre-wrap;
    overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .empty { color: var(--muted); font-size: 12px; text-align: center; padding: 18px 6px; border: 1px dashed var(--line); border-radius: 8px; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; align-items: center; justify-content: center; z-index: 50; }
  .overlay.show { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; width: 460px; max-width: 92vw; max-height: 90vh; overflow-y: auto; padding: 20px; }
  .modal h2 { margin: 0 0 16px; font-size: 16px; }
  .field { margin-bottom: 13px; }
  .field label, .seclabel { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 600; }
  .seclabel { text-transform: uppercase; letter-spacing: .3px; margin-bottom: 8px; }
  .field input, .field select, .field textarea { width: 100%; }
  .field textarea { resize: vertical; min-height: 64px; }
  .row2 { display: flex; gap: 12px; } .row2 > .field { flex: 1; }
  .ch-wrap { display: flex; gap: 6px; }
  .ch-wrap select { flex: 1; }
  .ch-wrap button { padding: 7px 11px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; } .modal-actions .spacer { flex: 1; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 14px; }
  .owner-chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .owner-chip { cursor: pointer; border: 1px solid var(--line); background: var(--panel-2); border-radius: 999px;
    padding: 5px 12px; font-size: 12px; user-select: none; }
  .owner-chip.sel { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .owner-chip.add { border-style: dashed; color: var(--muted); }
  .owner-chips .none { color: var(--muted); font-size: 12px; }
  .manage-sec { margin-bottom: 18px; }
  .manage-list { display: flex; flex-direction: column; gap: 6px; }
  .manage-row { display: flex; align-items: center; justify-content: space-between; gap: 8px;
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; padding: 6px 8px 6px 12px; }
  .manage-row button { padding: 2px 9px; color: var(--danger); border-color: transparent; background: transparent; }
  .manage-row button:hover { border-color: var(--danger); }
  .add-row { display: flex; gap: 8px; margin-top: 9px; } .add-row input { flex: 1; }
  .toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); background: var(--danger);
    color: #fff; padding: 9px 16px; border-radius: 8px; font-size: 13px; z-index: 80; display: none; max-width: 90vw; }
  /* calendar */
  .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .seg button { border: none; border-radius: 0; background: var(--panel-2); padding: 6px 13px; }
  .seg button.active { background: var(--accent); color: #fff; font-weight: 600; }
  #calendar { display: none; flex: 1; flex-direction: column; padding: 14px 20px; overflow: hidden; }
  .cal-controls { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .cal-label { font-weight: 700; font-size: 15px; margin-left: 6px; }
  .cal-main { flex: 1; display: flex; gap: 14px; overflow: hidden; }
  .tray { width: 230px; min-width: 230px; background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .tray h3 { font-size: 11px; text-transform: uppercase; color: var(--muted); margin: 2px 4px 4px; letter-spacing: .3px; }
  .cal-grid-wrap { flex: 1; overflow: auto; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; }
  .month { display: grid; grid-template-columns: repeat(7, 1fr); }
  .dow { padding: 7px 8px; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase;
    border-bottom: 1px solid var(--line); border-right: 1px solid var(--line); position: sticky; top: 0; background: var(--panel); z-index: 1; }
  .day-cell { border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); min-height: 108px;
    padding: 4px 5px 7px; display: flex; flex-direction: column; gap: 3px; }
  .day-cell.other .daynum { opacity: .35; }
  .day-head { display: flex; align-items: center; justify-content: space-between; }
  .daynum { font-size: 12px; font-weight: 600; padding: 1px 6px; }
  .day-cell.today .daynum { background: var(--accent); color: #fff; border-radius: 999px; }
  .add-day { font-size: 13px; color: var(--muted); cursor: pointer; opacity: 0; transition: .1s; padding: 0 4px; }
  .day-cell:hover .add-day { opacity: .7; }
  .add-day:hover { opacity: 1; color: var(--text); }
  .day-cell.drag-over { background: rgba(109,93,252,.14); }
  .week { display: grid; grid-template-columns: repeat(7, 1fr); min-height: 100%; }
  .week-col { min-height: 100%; }
  .dayview { min-height: 100%; border: none; }
  .ev { font-size: 12px; padding: 3px 7px; border-radius: 6px; color: #fff; cursor: grab; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  .ev:active { cursor: grabbing; }
  .ver { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; background: var(--panel-2);
    color: var(--muted); border: 1px solid var(--line); }
  .ver:hover { color: var(--text); border-color: var(--accent); }
  .row-ctrls { display: inline-flex; gap: 4px; align-items: center; }
  .mv { padding: 2px 8px; color: var(--text); border-color: transparent; background: transparent; font-weight: 700; }
  .mv:hover { border-color: var(--accent); }
  .mv:disabled { opacity: .25; cursor: default; border-color: transparent; }
  .lane-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
  #changelogList { display: flex; flex-direction: column; gap: 9px; }
  #changelogList .cl { font-size: 13px; color: var(--text); padding: 8px 11px; background: var(--panel-2);
    border: 1px solid var(--line); border-radius: 8px; }
  #changelogList .cl.new { border-color: var(--accent); }
  .swatch { width: 28px; height: 22px; padding: 0; border: 1px solid var(--line); border-radius: 6px; background: none; cursor: pointer; }
  .row-left { display: inline-flex; align-items: center; gap: 9px; }
  .opt { color: var(--muted); font-weight: 400; text-transform: none; letter-spacing: 0; }
  .cardfields { margin-top: 6px; font-size: 11px; color: var(--muted); }
  #grid { display: none; flex: 1; flex-direction: column; padding: 14px 20px; overflow: hidden; }
  .grid-wrap { flex: 1; overflow: auto; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; }
  #gridTable { width: 100%; border-collapse: collapse; font-size: 13px; }
  #gridTable th { position: sticky; top: 0; background: var(--panel); text-align: left; padding: 9px 12px;
    border-bottom: 1px solid var(--line); font-size: 11px; color: var(--muted); cursor: pointer; white-space: nowrap;
    text-transform: uppercase; letter-spacing: .3px; user-select: none; }
  #gridTable th:hover { color: var(--text); }
  #gridTable td { padding: 8px 12px; border-bottom: 1px solid var(--line); white-space: nowrap; max-width: 300px; overflow: hidden; text-overflow: ellipsis; }
  #gridTable tbody tr { cursor: pointer; }
  #gridTable tbody tr:hover { background: var(--panel-2); }
  .gdot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 7px; vertical-align: middle; }
  ::-webkit-scrollbar { height: 10px; width: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 6px; }
</style>
</head>
<body>
<header>
  <div class="brand-title">Smarter<span>Paw</span> · Channel Planner</div>
  <button class="ver" id="verBtn" title="What's new"></button>
  <div class="status-dot" id="syncStatus"><span class="d"></span><span class="t">…</span></div>
  <div class="seg" id="viewToggle"><button data-v="board" class="active">Board</button><button data-v="calendar">Calendar</button><button data-v="grid">Grid</button></div>
  <div class="filters" id="brandFilters"></div>
  <div class="filters">
    <select id="channelFilter"><option value="">All channels</option></select>
    <select id="colorBy" title="Color cards by"></select>
    <input class="search" id="search" placeholder="Search…" />
  </div>
  <div class="toolbar">
    <button class="primary" id="addBtn">+ Deliverable</button>
    <button id="manageBtn">⚙ Manage</button>
    <button id="xlsxBtn">Export Excel</button>
    <button class="ghost" id="menuBtn">⋯</button>
  </div>
</header>

<div class="board" id="board"></div>

<div id="calendar">
  <div class="cal-controls">
    <div class="seg" id="calModeSeg"><button data-m="month" class="active">Month</button><button data-m="week">Week</button><button data-m="day">Day</button></div>
    <button id="calPrev" title="Previous">‹</button>
    <button id="calToday">Today</button>
    <button id="calNext" title="Next">›</button>
    <div class="cal-label" id="calLabel"></div>
  </div>
  <div class="cal-main">
    <div class="tray" id="calTray"></div>
    <div class="cal-grid-wrap" id="calGrid"></div>
  </div>
</div>

<div id="grid"><div class="grid-wrap"><table id="gridTable"></table></div></div>

<!-- Add / Edit deliverable -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">New deliverable</h2>
    <input type="hidden" id="f_id" />
    <div class="field"><label>Title</label><input id="f_title" placeholder="e.g. July sale carousel" /></div>
    <div class="row2">
      <div class="field"><label>Brand</label><select id="f_brand"></select></div>
      <div class="field"><label>Channel</label>
        <div class="ch-wrap"><select id="f_channel"></select><button id="f_channelAdd" title="Add a channel">＋</button></div>
      </div>
    </div>
    <div class="field"><label>Owners</label><div class="owner-chips" id="f_owners"></div></div>
    <div class="row2">
      <div class="field"><label>Start / due date</label><input id="f_due" type="date" /></div>
      <div class="field"><label>End date <span class="opt">(optional — spans the calendar)</span></label><input id="f_end" type="date" /></div>
    </div>
    <div class="field"><label>Status</label><select id="f_status"></select></div>
    <div id="f_fields"></div>
    <div class="field"><label>Notes</label><textarea id="f_notes" placeholder="Brief, links, copy direction…"></textarea></div>
    <div class="modal-actions">
      <button class="ghost" id="deleteBtn" style="color:var(--danger);border-color:var(--danger)">Delete</button>
      <div class="spacer"></div>
      <button id="cancelBtn">Cancel</button>
      <button class="primary" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<!-- Manage channels & people -->
<div class="overlay" id="manageOverlay">
  <div class="modal">
    <h2>Manage board</h2>
    <div class="manage-sec">
      <span class="seclabel">Brand colors</span>
      <div class="manage-list" id="manageBrands"></div>
    </div>
    <div class="manage-sec">
      <span class="seclabel">Board lanes (drag order with ↑ ↓)</span>
      <div class="manage-list" id="manageStatuses"></div>
      <div class="add-row"><input id="mAddStatus" placeholder="New lane…" /><button class="primary" id="mAddStatusBtn">Add</button></div>
    </div>
    <div class="manage-sec">
      <span class="seclabel">Channels</span>
      <div class="manage-list" id="manageChannels"></div>
      <div class="add-row"><input id="mAddChannel" placeholder="New channel…" /><button class="primary" id="mAddChannelBtn">Add</button></div>
    </div>
    <div class="manage-sec">
      <span class="seclabel">People</span>
      <div class="manage-list" id="managePeople"></div>
      <div class="add-row"><input id="mAddPerson" placeholder="New person…" /><button class="primary" id="mAddPersonBtn">Add</button></div>
    </div>
    <div class="manage-sec">
      <span class="seclabel">Custom fields</span>
      <div class="manage-list" id="manageFields"></div>
      <div class="add-row"><input id="mAddField" placeholder="New field (e.g. Format, Budget)…" /><button class="primary" id="mAddFieldBtn">Add</button></div>
    </div>
    <div class="modal-actions"><div class="spacer"></div><button id="manageClose">Done</button></div>
    <div class="hint">Removing an item won't change cards that already use it — they keep the name.</div>
  </div>
</div>

<!-- Data & backup -->
<div class="overlay" id="menuOverlay">
  <div class="modal" style="width:360px">
    <h2>Data &amp; backup</h2>
    <div class="field"><button id="exportJsonBtn" style="width:100%">⬇ Export backup (.json)</button></div>
    <div class="field"><button id="importJsonBtn" style="width:100%">⬆ Import backup (.json)</button></div>
    <div class="field"><button id="csvBtn" style="width:100%">Export CSV</button></div>
    <input type="file" id="importFile" accept="application/json" style="display:none" />
    <div class="modal-actions"><div class="spacer"></div><button id="menuClose">Close</button></div>
    <div class="hint" id="menuHint"></div>
  </div>
</div>

<!-- Version history -->
<div class="overlay" id="verOverlay">
  <div class="modal" style="width:420px">
    <h2>Version history</h2>
    <div id="changelogList"></div>
    <div class="modal-actions"><div class="spacer"></div><button id="verClose">Close</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
<script>
"use strict";
const BRANDS = [{ name: "Meowi" }, { name: "Doggi" }, { name: "Kitty" }];
const DEFAULT_BRAND_HEX = { Meowi: "#6d5dfc", Doggi: "#f5a524", Kitty: "#ec4899" };
const DEFAULT_CHANNELS = ["Organic Social", "Email", "Meta Campaigns", "Web / Landing"];
const DEFAULT_PEOPLE = ["Jason", "Brennan"];
// ── Version & changelog ───────────────────────────────────────────────
// To log a release: bump VERSION and add a line to the TOP of CHANGELOG.
const VERSION = "1.4";
const CHANGELOG = [
  "v1.4 — End dates (multi-day spans on calendar), color-by switcher + custom colors, custom fields, Grid view",
  "v1.3 — Custom Kanban lanes, add channels from the dropdown, version history",
  "v1.2 — Calendar view (month / week / day) with drag-to-reschedule + unscheduled tray",
  "v1.1 — Manageable channels & people, multiple owners per deliverable",
  "v1.0 — Initial board + Supabase live-sync backend",
];

const DEFAULT_STATUSES = ["Backlog", "In Progress", "Review", "Scheduled", "Live"];
const STATUS_COLORS = { "Backlog": "#6b7280", "In Progress": "#3b82f6",
  "Review": "#a855f7", "Scheduled": "#f59e0b", "Live": "#22c55e" };
const PALETTE = ["#6b7280","#3b82f6","#a855f7","#f59e0b","#22c55e","#ec4899","#06b6d4","#84cc16","#f43f5e","#14b8a6"];
const COLOR_DIMS = [{ key: "brand", label: "Brand" }, { key: "channel", label: "Channel" }, { key: "status", label: "Lane" }];
function colorOf(list, name, fallbackMap) {
  const item = list.find(x => x.name === name);
  if (item && item.color) return item.color;
  if (fallbackMap && fallbackMap[name]) return fallbackMap[name];
  const idx = list.findIndex(x => x.name === name);
  return PALETTE[(idx < 0 ? 0 : idx) % PALETTE.length];
}
function brandColor(n) { return colorOf(brandsList, n, DEFAULT_BRAND_HEX); }
function channelColorOf(n) { return colorOf(channelsList, n, null); }
function statusColor(name) { return colorOf(statusList, name, STATUS_COLORS); }
function colorFor(c) { return colorBy === "channel" ? channelColorOf(c.channel) : colorBy === "status" ? statusColor(c.status) : brandColor(c.brand); }
const STORE_KEY = "smarterpaw-planner-v1";
const LIST_KEY = "smarterpaw-planner-lists-v1";

const CFG = window.PLANNER_CONFIG || {};
const ONLINE = !!(CFG.url && CFG.anonKey && window.supabase);
const db = ONLINE ? window.supabase.createClient(CFG.url, CFG.anonKey) : null;

let cards = [];
let channelsList = [];   // [{id?, name, color?}]
let peopleList = [];     // [{id?, name}]
let statusList = [];     // [{id?, name, color?}] — the Kanban lanes, in order
let brandsList = [];     // [{id?, name, color}]
let fieldsList = [];     // [{id?, name}] — custom field definitions
let colorBy = localStorage.getItem("planner-colorby") || "brand";
let activeBrands = new Set(BRANDS.map(b => b.name));
let channelFilter = "", searchText = "";
let modalOpen = false, manageOpen = false, _listsWarned = false;
let modalOwners = new Set();
let view = "board", calMode = "month", calRef = new Date();
let gridSort = { key: "due", dir: 1 };
let _idc = Date.now();
function uid() { return "c" + (_idc++).toString(36); }
function toast(msg) { const t = document.getElementById("toast"); t.textContent = msg; t.style.display = "block"; setTimeout(() => t.style.display = "none", 3500); }

/* ---------- deliverables data ---------- */
function loadLocal() { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || sampleData(); } catch (e) { return sampleData(); } }
function saveLocal() { localStorage.setItem(STORE_KEY, JSON.stringify(cards)); }
async function refetch() {
  if (!ONLINE) { cards = loadLocal(); render(); return; }
  const { data, error } = await db.from("deliverables").select("*").order("created_at", { ascending: true });
  if (error) { toast("Load failed: " + error.message); return; }
  cards = data.map(r => ({ id: r.id, title: r.title, brand: r.brand, channel: r.channel,
    owner: r.owner || "", due: r.due || "", end: r.end_date || "", status: r.status, notes: r.notes || "",
    fields: r.fields || {} }));
  render();
}
function dbObj(d) { return { title: d.title, brand: d.brand, channel: d.channel, owner: d.owner || "",
  due: d.due || null, end_date: d.end || null, status: d.status, notes: d.notes || "", fields: d.fields || {} }; }
async function createCard(d) {
  if (!ONLINE) { cards.push(Object.assign({ id: uid() }, d)); saveLocal(); render(); return; }
  const { error } = await db.from("deliverables").insert(dbObj(d));
  if (error) toast("Save failed: " + error.message); else refetch();
}
async function updateCard(id, d) {

/* ---------- channels & people lists ---------- */
function defaultBrands() { return BRANDS.map(b => ({ name: b.name, color: DEFAULT_BRAND_HEX[b.name] })); }
function saveListsLocal() { localStorage.setItem(LIST_KEY, JSON.stringify({ channels: channelsList, people: peopleList, statuses: statusList, brands: brandsList, fields: fieldsList })); }
async function loadLists() {
  if (!ONLINE) {
    const raw = JSON.parse(localStorage.getItem(LIST_KEY) || "null");
    if (raw && raw.channels) {
      channelsList = raw.channels; peopleList = raw.people || []; statusList = raw.statuses || DEFAULT_STATUSES.map(n => ({ name: n }));
      brandsList = raw.brands || defaultBrands(); fieldsList = raw.fields || [];
    } else {
      channelsList = DEFAULT_CHANNELS.map(n => ({ name: n })); peopleList = DEFAULT_PEOPLE.map(n => ({ name: n }));
      statusList = DEFAULT_STATUSES.map(n => ({ name: n })); brandsList = defaultBrands(); fieldsList = []; saveListsLocal();
    }
    return;
  }
  const { data, error } = await db.from("lists").select("*").order("position", { ascending: true });
  if (error) {
    channelsList = DEFAULT_CHANNELS.map(n => ({ name: n })); peopleList = DEFAULT_PEOPLE.map(n => ({ name: n }));
    statusList = DEFAULT_STATUSES.map(n => ({ name: n })); brandsList = defaultBrands(); fieldsList = [];
    if (!_listsWarned) { _listsWarned = true; toast("Lists not saved yet — run the lists SQL (0002–0004) in Supabase."); }
    return;
  }
  const map = (k) => data.filter(r => r.kind === k).map(r => ({ id: r.id, name: r.name, color: r.color || undefined }));
  channelsList = map("channel"); peopleList = map("person"); statusList = map("status");
  brandsList = map("brand"); fieldsList = map("field");
  if (channelsList.length === 0) channelsList = DEFAULT_CHANNELS.map(n => ({ name: n }));
  if (statusList.length === 0) statusList = DEFAULT_STATUSES.map(n => ({ name: n }));
  if (brandsList.length === 0) brandsList = defaultBrands();
}
function listFor(kind) { return { channel: channelsList, person: peopleList, status: statusList, brand: brandsList, field: fieldsList }[kind]; }
async function setColor(item, color) {
  item.color = color;
  if (!ONLINE) { saveListsLocal(); afterListsChanged(); return; }
  const { error } = await db.from("lists").update({ color }).eq("id", item.id);
  if (error) toast("Color save failed: " + error.message); else reloadListsAndUI();
}
async function reloadListsAndUI() { await loadLists(); afterListsChanged(); }
function afterListsChanged() {
  buildChannelFilter(); buildChannelSelect(); buildStatusSelect();
  if (modalOpen) renderOwnerChips();
  if (manageOpen) renderManage();
  render();
}
async function addList(kind, name) {
  name = (name || "").trim(); if (!name) return false;
  const arr = listFor(kind);
  if (arr.some(x => x.name.toLowerCase() === name.toLowerCase())) { toast('"' + name + '" already exists'); return false; }
  if (!ONLINE) { arr.push({ name }); saveListsLocal(); afterListsChanged(); return true; }
  const { error } = await db.from("lists").insert({ kind, name, position: arr.length + 1 });
  if (error) { toast("Add failed: " + error.message); return false; }
  await reloadListsAndUI(); return true;
}
async function removeList(kind, item) {
  if (kind === "status" && statusList.length <= 1) { toast("Keep at least one lane."); return; }
  const extra = kind === "status" ? " Cards keep that status in a leftover column until you move them." : " Cards already using it keep the name.";
  if (!confirm('Remove "' + item.name + '"?' + extra)) return;
  if (!ONLINE) {
    const arr = listFor(kind);
    if (kind === "channel") channelsList = arr.filter(x => x.name !== item.name);
    else if (kind === "person") peopleList = arr.filter(x => x.name !== item.name);
    else statusList = arr.filter(x => x.name !== item.name);
    saveListsLocal(); afterListsChanged(); return;
  }
  const { error } = await db.from("lists").delete().eq("id", item.id);
  if (error) toast("Remove failed: " + error.message); else reloadListsAndUI();
}
async function moveStatus(item, dir) {
  const arr = [...statusList]; const i = arr.findIndex(s => s.name === item.name); const j = i + dir;
  if (j < 0 || j >= arr.length) return;
  [arr[i], arr[j]] = [arr[j], arr[i]];
  if (!ONLINE) { statusList = arr; saveListsLocal(); afterListsChanged(); return; }
  await Promise.all(arr.map((s, k) => db.from("lists").update({ position: k + 1 }).eq("id", s.id)));
  await reloadListsAndUI();
}

/* ---------- render board ---------- */
function isOverdue(c) { if (!c.due || c.status === "Live") return false; const t = new Date(); t.setHours(0,0,0,0); return new Date(c.due + "T00:00:00") < t; }
function fmtDue(d) { if (!d) return ""; return new Date(d + "T00:00:00").toLocaleDateString(undefined, { month: "short", day: "numeric" }); }
function esc(s) { return (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function visibleCards() {
  const q = searchText.trim().toLowerCase();
  return cards.filter(c => activeBrands.has(c.brand) && (!channelFilter || c.channel === channelFilter) &&
    (!q || (c.title + " " + (c.notes||"") + " " + (c.owner||"")).toLowerCase().includes(q)));
}
function render() { if (view === "calendar") renderCalendar(); else if (view === "grid") renderGrid(); else renderBoard(); }
function renderBoard() {

  const lanes = laneNames.map((name, i) => ({ name, color: statusColor(name, i) }))
    .concat(orphans.map(name => ({ name, color: "#475569" })));
  lanes.forEach(st => {
    const col = document.createElement("div"); col.className = "col";
    const colCards = vis.filter(c => c.status === st.name);

    head.appendChild(bar); head.appendChild(h2); head.appendChild(cnt);

    else colCards.forEach(c => body.appendChild(cardEl(c)));
    body.addEventListener("dragover", e => { e.preventDefault(); body.classList.add("drag-over"); });
    body.addEventListener("dragleave", () => body.classList.remove("drag-over"));
    body.addEventListener("drop", e => { e.preventDefault(); body.classList.remove("drag-over");
      const id = e.dataTransfer.getData("text/plain"); const card = cards.find(c => c.id === id);

function fmtRange(due, end) {
  if (!due && !end) return "";
  if (due && end && end !== due) return fmtDue(due) + " → " + fmtDue(end);
  return fmtDue(due || end);
}
function fieldBits(c) {
  return fieldsList.map(f => c.fields && c.fields[f.name] ? esc(f.name) + ": " + esc(c.fields[f.name]) : "").filter(Boolean).join(" · ");
}

/* ---------- calendar view ---------- */
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function ymd(d) { return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); }
function parseYmd(s) { const p = s.split("-").map(Number); return new Date(p[0], p[1]-1, p[2]); }
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate()+n); return x; }
function startOfWeek(d) { const x = new Date(d.getFullYear(), d.getMonth(), d.getDate()); x.setDate(x.getDate()-x.getDay()); return x; }
function setView(v) {
  view = v;
  document.getElementById("board").style.display = v === "board" ? "flex" : "none";
  document.getElementById("calendar").style.display = v === "calendar" ? "flex" : "none";

  document.querySelectorAll("#viewToggle button").forEach(b => b.classList.toggle("active", b.dataset.v === v));
  render();
}
function buildColorBy() {

}
function gridColumns() {
  return [{ key: "brand", label: "Brand" }, { key: "channel", label: "Channel" }, { key: "title", label: "Title" },
    { key: "owner", label: "Owners" }, { key: "status", label: "Status" }, { key: "due", label: "Due" }, { key: "end", label: "End" }]
    .concat(fieldsList.map(f => ({ key: "field:" + f.name, label: f.name }))).concat([{ key: "notes", label: "Notes" }]);
}
function gridValue(c, key) {
  if (key.indexOf("field:") === 0) return (c.fields && c.fields[key.slice(6)]) || "";
  return c[key] || "";
}
function renderGrid() {
  const cols = gridColumns();
  const rows = visibleCards().slice().sort((a, b) => {
    const va = String(gridValue(a, gridSort.key)).toLowerCase(), vb = String(gridValue(b, gridSort.key)).toLowerCase();
    return (va < vb ? -1 : va > vb ? 1 : 0) * gridSort.dir;
  });
  const table = document.getElementById("gridTable"); table.innerHTML = "";
  const thead = document.createElement("thead"); const trh = document.createElement("tr");
  cols.forEach(col => {
    const th = document.createElement("th");
    th.textContent = col.label + (gridSort.key === col.key ? (gridSort.dir > 0 ? " ▲" : " ▼") : "");
    th.onclick = () => { if (gridSort.key === col.key) gridSort.dir *= -1; else { gridSort.key = col.key; gridSort.dir = 1; } renderGrid(); };
    trh.appendChild(th);
  });
  thead.appendChild(trh); table.appendChild(thead);
  const tbody = document.createElement("tbody");
  rows.forEach(c => {
    const tr = document.createElement("tr"); tr.onclick = () => openModal(c);
    cols.forEach(col => {
      const td = document.createElement("td");
      if (col.key === "brand") { const dot = document.createElement("span"); dot.className = "gdot"; dot.style.background = brandColor(c.brand); td.appendChild(dot); td.appendChild(document.createTextNode(c.brand)); }
      else if (col.key === "due" || col.key === "end") td.textContent = gridValue(c, col.key) ? fmtDue(gridValue(c, col.key)) : "";
      else td.textContent = gridValue(c, col.key);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
}
function setCalMode(m) {
  calMode = m;
  document.querySelectorAll("#calModeSeg button").forEach(b => b.classList.toggle("active", b.dataset.m === m));
  renderCalendar();
}
function calNav(dir) {
  if (calMode === "month") calRef = new Date(calRef.getFullYear(), calRef.getMonth()+dir, 1);
  else if (calMode === "week") calRef = addDays(calRef, 7*dir);
  else calRef = addDays(calRef, dir);
  renderCalendar();
}
function eventsFor(date) {
  const k = ymd(date);
  return visibleCards().filter(c => {
    if (!c.due && !c.end) return false;
    const a = c.due || c.end, b = c.end || c.due; const s = a < b ? a : b, e = a < b ? b : a;
    return k >= s && k <= e;
  });
}
function evEl(c) {
  const e = document.createElement("div"); e.className = "ev";
  e.style.background = colorFor(c); e.textContent = c.title;
  const span = (c.due && c.end && c.due !== c.end) ? " · " + fmtRange(c.due, c.end) : "";
  e.title = c.brand + " · " + c.channel + (c.owner ? " · " + c.owner : "") + span;
  e.draggable = true;
  e.addEventListener("dragstart", ev => { ev.dataTransfer.setData("text/plain", c.id); ev.stopPropagation(); });
  e.addEventListener("click", ev => { ev.stopPropagation(); openModal(c); });
  return e;
}
function attachDrop(cell, date) {
  cell.addEventListener("dragover", e => { e.preventDefault(); cell.classList.add("drag-over"); });
  cell.addEventListener("dragleave", () => cell.classList.remove("drag-over"));
  cell.addEventListener("drop", e => { e.preventDefault(); cell.classList.remove("drag-over");
    const id = e.dataTransfer.getData("text/plain"); if (!id) return;
    const card = cards.find(c => c.id === id); if (!card) return;
    const newDue = ymd(date);
    if (card.due && card.end && card.end !== card.due) {
      const span = Math.round((parseYmd(card.end) - parseYmd(card.due)) / 86400000);
      patchDates(id, newDue, ymd(addDays(date, span)));
    } else { patchDue(id, newDue); }
  });
}
function dayCell(date, inMonth, todayKey) {
  const cell = document.createElement("div");
  cell.className = "day-cell" + (inMonth ? "" : " other") + (ymd(date) === todayKey ? " today" : "");
  const head = document.createElement("div"); head.className = "day-head";
  const num = document.createElement("span"); num.className = "daynum"; num.textContent = date.getDate();
  const plus = document.createElement("span"); plus.className = "add-day"; plus.textContent = "＋"; plus.title = "Add deliverable";
  plus.onclick = ev => { ev.stopPropagation(); openModal(null, { due: ymd(date) }); };
  head.appendChild(num); head.appendChild(plus); cell.appendChild(head);
  eventsFor(date).forEach(c => cell.appendChild(evEl(c)));
  attachDrop(cell, date); return cell;
}
function renderTray() {
  const tray = document.getElementById("calTray"); tray.innerHTML = "<h3>Unscheduled</h3>";
  const un = visibleCards().filter(c => !c.due);
  if (un.length === 0) { const e = document.createElement("div"); e.className = "empty"; e.textContent = "Nothing unscheduled"; tray.appendChild(e); return; }
  un.forEach(c => { const e = evEl(c); e.style.whiteSpace = "normal"; tray.appendChild(e); });

function renderCalendar() {
  const label = document.getElementById("calLabel"); const grid = document.getElementById("calGrid"); grid.innerHTML = "";
  const todayKey = ymd(new Date());
  if (calMode === "month") {
    const y = calRef.getFullYear(), m = calRef.getMonth();
    label.textContent = MONTHS[m] + " " + y;
    const first = new Date(y, m, 1); const gridStart = startOfWeek(first);
    const daysInMonth = new Date(y, m+1, 0).getDate(); const weeks = Math.ceil((first.getDay() + daysInMonth) / 7);
    const month = document.createElement("div"); month.className = "month";
    DOW.forEach(d => { const h = document.createElement("div"); h.className = "dow"; h.textContent = d; month.appendChild(h); });
    for (let i = 0; i < weeks*7; i++) { const date = addDays(gridStart, i); month.appendChild(dayCell(date, date.getMonth() === m, todayKey)); }
    grid.appendChild(month);
  } else if (calMode === "week") {
    const start = startOfWeek(calRef); const end = addDays(start, 6);
    label.textContent = (start.getMonth() === end.getMonth())
      ? MONTHS[start.getMonth()] + " " + start.getDate() + " – " + end.getDate() + ", " + end.getFullYear()
      : MONTHS[start.getMonth()] + " " + start.getDate() + " – " + MONTHS[end.getMonth()] + " " + end.getDate() + ", " + end.getFullYear();
    const week = document.createElement("div"); week.className = "week";
    for (let i = 0; i < 7; i++) {
      const date = addDays(start, i);
      const col = document.createElement("div"); col.className = "day-cell week-col" + (ymd(date) === todayKey ? " today" : "");
      const head = document.createElement("div"); head.className = "day-head";
      const lbl = document.createElement("span"); lbl.className = "daynum"; lbl.textContent = DOW[date.getDay()] + " " + date.getDate();
      const plus = document.createElement("span"); plus.className = "add-day"; plus.textContent = "＋";
      plus.onclick = ev => { ev.stopPropagation(); openModal(null, { due: ymd(date) }); };
      head.appendChild(lbl); head.appendChild(plus); col.appendChild(head);
      eventsFor(date).forEach(c => col.appendChild(evEl(c))); attachDrop(col, date); week.appendChild(col);
    }
    grid.appendChild(week);
  } else {
    const date = new Date(calRef.getFullYear(), calRef.getMonth(), calRef.getDate());
    label.textContent = DOW[date.getDay()] + ", " + MONTHS[date.getMonth()] + " " + date.getDate() + ", " + date.getFullYear();
    const dv = document.createElement("div"); dv.className = "dayview day-cell" + (ymd(date) === todayKey ? " today" : "");
    const head = document.createElement("div"); head.className = "day-head";
    const plus = document.createElement("button"); plus.textContent = "＋ Add for this day"; plus.onclick = () => openModal(null, { due: ymd(date) });
    head.appendChild(plus); dv.appendChild(head);
    const evs = eventsFor(date);
    if (evs.length === 0) { const e = document.createElement("div"); e.className = "empty"; e.textContent = "Nothing scheduled"; dv.appendChild(e); }
    else evs.forEach(c => { const e = evEl(c); e.style.whiteSpace = "normal"; dv.appendChild(e); });
    attachDrop(dv, date); grid.appendChild(dv);
  }
  renderTray();
}

  fieldsList.forEach(f => {
    const wrap = document.createElement("div"); wrap.className = "field";
    const lab = document.createElement("label"); lab.textContent = f.name;
    const inp = document.createElement("input"); inp.dataset.field = f.name; inp.value = (values && values[f.name]) || "";
    wrap.appendChild(lab); wrap.appendChild(inp); box.appendChild(wrap);
  });
}

/* ---------- modal ---------- */
function openModal(card, prefill) {
  modalOpen = true;
  document.getElementById("modalTitle").textContent = card ? "Edit deliverable" : "New deliverable";
  document.getElementById("f_id").value = card ? card.id : "";
  document.getElementById("f_title").value = card ? card.title : "";
  document.getElementById("f_brand").value = card ? card.brand : BRANDS[0].name;
  buildChannelSelect(); buildStatusSelect();
  const chSel = document.getElementById("f_channel");
  if (card && card.channel && !channelsList.some(c => c.name === card.channel)) { const o = document.createElement("option"); o.value = card.channel; o.textContent = card.channel; chSel.insertBefore(o, chSel.firstChild); }
  chSel.value = card ? card.channel : (channelsList[0] ? channelsList[0].name : "");
  modalOwners = new Set((card && card.owner ? card.owner.split(",") : []).map(s => s.trim()).filter(Boolean));
  renderOwnerChips();
  document.getElementById("f_due").value = card ? (card.due||"") : (prefill && prefill.due ? prefill.due : "");
  document.getElementById("f_end").value = card ? (card.end||"") : "";
  renderFieldInputs(card ? (card.fields || {}) : {});
  const stSel = document.getElementById("f_status");
  if (card && card.status && !statusList.some(s => s.name === card.status)) { const o = document.createElement("option"); o.value = card.status; o.textContent = card.status; stSel.appendChild(o); }
  stSel.value = card ? card.status : (statusList[0] ? statusList[0].name : "Backlog");
  document.getElementById("f_notes").value = card ? (card.notes||"") : "";
  document.getElementById("deleteBtn").style.display = card ? "" : "none";
  document.getElementById("overlay").classList.add("show");
  document.getElementById("f_title").focus();
}
function closeModal() { modalOpen = false; document.getElementById("overlay").classList.remove("show"); }
function saveModal() {
  const id = document.getElementById("f_id").value;
  const title = document.getElementById("f_title").value.trim();
  if (!title) { document.getElementById("f_title").focus(); return; }
  const fields = {};
  document.querySelectorAll("#f_fields input").forEach(i => { const v = i.value.trim(); if (v) fields[i.dataset.field] = v; });
  const d = { title, brand: document.getElementById("f_brand").value, channel: document.getElementById("f_channel").value,
    owner: [...modalOwners].join(", "), due: document.getElementById("f_due").value, end: document.getElementById("f_end").value,
    status: document.getElementById("f_status").value, notes: document.getElementById("f_notes").value.trim(), fields };
  if (id) updateCard(id, d); else createCard(d);
  closeModal();
}
function deleteCard() { const id = document.getElementById("f_id").value; if (id && confirm("Delete this deliverable?")) { removeCard(id); closeModal(); } }

/* ---------- manage panel ---------- */
function fillManage(id, list, kind) {
  const el = document.getElementById(id); el.innerHTML = "";
  list.forEach((it, i) => el.appendChild(manageRow(kind, it, i)));
}
function renderManage() {
  fillManage("manageBrands", brandsList, "brand");
  fillManage("manageStatuses", statusList, "status");
  fillManage("manageChannels", channelsList, "channel");
  fillManage("managePeople", peopleList, "person");
  fillManage("manageFields", fieldsList, "field");
}
function manageRow(kind, item, idx) {
  const row = document.createElement("div"); row.className = "manage-row";
  const left = document.createElement("span"); left.className = "row-left";
  if (kind === "brand" || kind === "channel" || kind === "status") {
    const eff = kind === "brand" ? brandColor(item.name) : kind === "channel" ? channelColorOf(item.name) : statusColor(item.name);
    const sw = document.createElement("input"); sw.type = "color"; sw.className = "swatch"; sw.value = eff; sw.title = "Color";
    sw.onchange = () => setColor(item, sw.value); left.appendChild(sw);
  }
  left.appendChild(document.createTextNode(item.name));
  const ctrls = document.createElement("span"); ctrls.className = "row-ctrls";
  if (kind === "status") {
    const up = document.createElement("button"); up.textContent = "↑"; up.className = "mv"; up.disabled = idx === 0; up.onclick = () => moveStatus(item, -1);
    const dn = document.createElement("button"); dn.textContent = "↓"; dn.className = "mv"; dn.disabled = idx === statusList.length - 1; dn.onclick = () => moveStatus(item, 1);
    ctrls.appendChild(up); ctrls.appendChild(dn);
  }
  if (kind !== "brand") { const btn = document.createElement("button"); btn.textContent = "Remove"; btn.onclick = () => removeList(kind, item); ctrls.appendChild(btn); }
  row.appendChild(left); row.appendChild(ctrls); return row;
}
function openManage() { manageOpen = true; renderManage(); document.getElementById("manageOverlay").classList.add("show"); }
function closeManage() { manageOpen = false; document.getElementById("manageOverlay").classList.remove("show"); }

/* ---------- exports ---------- */
function download(filename, blob) { const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = filename;
  document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(a.href), 1000); }
function exportCols() { return ["Brand","Channel","Title","Owners","Status","Due","End"].concat(fieldsList.map(f => f.name)).concat(["Notes"]); }
function exportRow(c) { return [c.brand, c.channel, c.title, c.owner||"", c.status, c.due||"", c.end||""]
  .concat(fieldsList.map(f => (c.fields && c.fields[f.name]) || "")).concat([(c.notes||"").replace(/\n/g," ")]); }
function exportCSV() {
  const rows = [exportCols()];
  cards.forEach(c => rows.push(exportRow(c)));
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")).join("\r\n");
  download("smarterpaw-planner.csv", new Blob([csv], { type: "text/csv" }));
}
function exportJSON() { download("smarterpaw-planner-backup.json", new Blob([JSON.stringify(cards,null,2)], { type: "application/json" })); }
function colLetter(n){ let s=""; n++; while(n>0){ const m=(n-1)%26; s=String.fromCharCode(65+m)+s; n=Math.floor((n-1)/26);} return s; }
function xmlEsc(s){ return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&apos;"}[c])); }
function sheetXml(rows){
  let body = "";
  rows.forEach((row, ri) => { let cells = "";
    row.forEach((val, ci) => { const ref = colLetter(ci) + (ri+1); const s = ri === 0 ? ' s="1"' : '';
      cells += `<c r="${ref}" t="inlineStr"${s}><is><t xml:space="preserve">${xmlEsc(val)}</t></is></c>`; });
    body += `<row r="${ri+1}">${cells}</row>`; });
  const last = colLetter(rows[0].length-1) + rows.length;
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">` +
    `<dimension ref="A1:${last}"/><sheetData>${body}</sheetData><autoFilter ref="A1:${colLetter(rows[0].length-1)}1"/></worksheet>`;
}
function buildXlsx(rows){
  const files = {
    "[Content_Types].xml": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/><Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/></Types>`,
    "_rels/.rels": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>`,
    "xl/workbook.xml": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="Deliverables" sheetId="1" r:id="rId1"/></sheets></workbook>`,
    "xl/_rels/workbook.xml.rels": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/></Relationships>`,
    "xl/styles.xml": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><fonts count="2"><font><sz val="11"/><name val="Calibri"/></font><font><b/><sz val="11"/><name val="Calibri"/></font></fonts><fills count="2"><fill><patternFill patternType="none"/></fill><fill><patternFill patternType="gray125"/></fill></fills><borders count="1"><border/></borders><cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs><cellXfs count="2"><xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/><xf numFmtId="0" fontId="1" fillId="0" borderId="0" xfId="0" applyFont="1"/></cellXfs></styleSheet>`,
    "xl/worksheets/sheet1.xml": sheetXml(rows),
  };
  return zipStore(files);
}
const CRC_TABLE = (() => { const t = new Uint32Array(256); for (let n=0;n<256;n++){ let c=n; for(let k=0;k<8;k++) c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1); t[n]=c>>>0;} return t; })();
function crc32(b){ let c=0xFFFFFFFF; for(let i=0;i<b.length;i++) c=CRC_TABLE[(c^b[i])&0xFF]^(c>>>8); return (c^0xFFFFFFFF)>>>0; }
function zipStore(filesObj){
  const enc = new TextEncoder();
  const entries = Object.keys(filesObj).map(name => { const data = enc.encode(filesObj[name]); return { nameBytes: enc.encode(name), data, crc: crc32(data) }; });
  const chunks = []; let offset = 0; const central = [];
  const u16 = n => [n&0xFF,(n>>8)&0xFF]; const u32 = n => [n&0xFF,(n>>8)&0xFF,(n>>16)&0xFF,(n>>24)&0xFF];
  entries.forEach(e => { const hb = new Uint8Array([].concat(u32(0x04034b50),u16(20),u16(0),u16(0),u16(0),u16(0),u32(e.crc),u32(e.data.length),u32(e.data.length),u16(e.nameBytes.length),u16(0)));
    chunks.push(hb, e.nameBytes, e.data); central.push({ e, offset }); offset += hb.length + e.nameBytes.length + e.data.length; });
  const cdStart = offset; const cdChunks = [];
  central.forEach(({e, offset}) => { const cb = new Uint8Array([].concat(u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(e.crc),u32(e.data.length),u32(e.data.length),u16(e.nameBytes.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset))); cdChunks.push(cb, e.nameBytes); });
  let cdSize = 0; cdChunks.forEach(c => cdSize += c.length);
  const eocd = new Uint8Array([].concat(u32(0x06054b50),u16(0),u16(0),u16(entries.length),u16(entries.length),u32(cdSize),u32(cdStart),u16(0)));
  const all = [...chunks, ...cdChunks, eocd]; let total = 0; all.forEach(c => total += c.length);
  const out = new Uint8Array(total); let p = 0; all.forEach(c => { out.set(c, p); p += c.length; }); return out;
}
function exportXLSX(){
  const rows = [exportCols()];
  const order = {}; statusList.forEach((s,i)=>order[s.name]=i);
  const ord = s => (s in order ? order[s] : 999);
  [...cards].sort((a,b)=> a.brand.localeCompare(b.brand) || (ord(a.status)-ord(b.status)) || a.channel.localeCompare(b.channel))
    .forEach(c => rows.push(exportRow(c)));
  download("smarterpaw-planner.xlsx", new Blob([buildXlsx(rows)], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" }));
}

/* ---------- import ---------- */
async function importJSON(arr) {
  if (!ONLINE) { cards = arr; saveLocal(); render(); return; }
  const { error } = await db.from("deliverables").insert(arr.map(dbObj));
  if (error) toast("Import failed: " + error.message); else refetch();
}

/* ---------- init ---------- */
function setSyncUI() {
  const el = document.getElementById("syncStatus");
  if (ONLINE) { el.classList.add("live"); el.querySelector(".t").textContent = "Live · synced"; }
  else { el.classList.add("local"); el.querySelector(".t").textContent = "Local only (not connected)"; }
  document.getElementById("menuHint").textContent = ONLINE
    ? "Connected to Supabase. Changes sync live across everyone with the board open."
    : "Not connected — saving to this browser only.";
}
function renderChangelog() {
  const box = document.getElementById("changelogList"); box.innerHTML = "";
  CHANGELOG.forEach((line, i) => { const d = document.createElement("div"); d.className = "cl" + (i === 0 ? " new" : ""); d.textContent = line; box.appendChild(d); });
}
async function init() {
  fillStaticSelects();
  await loadLists();
  buildBrandFilters(); buildChannelFilter(); buildChannelSelect(); buildStatusSelect(); buildColorBy();
  setSyncUI();
  document.getElementById("verBtn").textContent = "v" + VERSION;
  renderChangelog();
  await refetch();

  if (ONLINE) {
    db.channel("planner-deliverables").on("postgres_changes", { event: "*", schema: "public", table: "deliverables" }, refetch).subscribe();
    db.channel("planner-lists").on("postgres_changes", { event: "*", schema: "public", table: "lists" }, reloadListsAndUI).subscribe();
  }

  document.getElementById("channelFilter").onchange = e => { channelFilter = e.target.value; render(); };
  document.getElementById("colorBy").onchange = e => { colorBy = e.target.value; localStorage.setItem("planner-colorby", colorBy); render(); };
  document.getElementById("search").oninput = e => { searchText = e.target.value; render(); };

  document.querySelectorAll("#viewToggle button").forEach(b => b.onclick = () => setView(b.dataset.v));
  document.querySelectorAll("#calModeSeg button").forEach(b => b.onclick = () => setCalMode(b.dataset.m));
  document.getElementById("calPrev").onclick = () => calNav(-1);
  document.getElementById("calNext").onclick = () => calNav(1);
  document.getElementById("calToday").onclick = () => { calRef = new Date(); renderCalendar(); };

  document.getElementById("addBtn").onclick = () => openModal(null);
  document.getElementById("saveBtn").onclick = saveModal;
  document.getElementById("cancelBtn").onclick = closeModal;
  document.getElementById("deleteBtn").onclick = deleteCard;
  document.getElementById("overlay").onclick = e => { if (e.target.id === "overlay") closeModal(); };
  document.getElementById("f_channelAdd").onclick = async () => {
    const name = (prompt("New channel name:") || "").trim(); if (!name) return;
    const ok = await addList("channel", name); if (ok) document.getElementById("f_channel").value = name;
  };
  document.getElementById("f_channel").addEventListener("change", async e => {
    if (e.target.value !== "__add_channel__") return;
    const name = (prompt("New channel name:") || "").trim();
    if (name) { const ok = await addList("channel", name); e.target.value = ok ? name : (channelsList[0] || {}).name || ""; }
    else e.target.value = (channelsList[0] || {}).name || "";
  });
  document.getElementById("xlsxBtn").onclick = exportXLSX;
  document.getElementById("verBtn").onclick = () => document.getElementById("verOverlay").classList.add("show");
  document.getElementById("verClose").onclick = () => document.getElementById("verOverlay").classList.remove("show");
  document.getElementById("verOverlay").onclick = e => { if (e.target.id === "verOverlay") e.currentTarget.classList.remove("show"); };

  document.getElementById("manageBtn").onclick = openManage;
  document.getElementById("manageClose").onclick = closeManage;
  document.getElementById("manageOverlay").onclick = e => { if (e.target.id === "manageOverlay") closeManage(); };
  const addCh = () => { const i = document.getElementById("mAddChannel"); addList("channel", i.value).then(ok => { if (ok) i.value = ""; }); };
  const addPe = () => { const i = document.getElementById("mAddPerson"); addList("person", i.value).then(ok => { if (ok) i.value = ""; }); };
  const addSt = () => { const i = document.getElementById("mAddStatus"); addList("status", i.value).then(ok => { if (ok) i.value = ""; }); };
  const addFl = () => { const i = document.getElementById("mAddField"); addList("field", i.value).then(ok => { if (ok) i.value = ""; }); };
  document.getElementById("mAddChannelBtn").onclick = addCh;
  document.getElementById("mAddPersonBtn").onclick = addPe;
  document.getElementById("mAddStatusBtn").onclick = addSt;
  document.getElementById("mAddFieldBtn").onclick = addFl;
  document.getElementById("mAddChannel").addEventListener("keydown", e => { if (e.key === "Enter") addCh(); });
  document.getElementById("mAddPerson").addEventListener("keydown", e => { if (e.key === "Enter") addPe(); });
  document.getElementById("mAddStatus").addEventListener("keydown", e => { if (e.key === "Enter") addSt(); });
  document.getElementById("mAddField").addEventListener("keydown", e => { if (e.key === "Enter") addFl(); });

  const menu = document.getElementById("menuOverlay");
  document.getElementById("menuBtn").onclick = () => menu.classList.add("show");
  document.getElementById("menuClose").onclick = () => menu.classList.remove("show");
  menu.onclick = e => { if (e.target.id === "menuOverlay") menu.classList.remove("show"); };
  document.getElementById("csvBtn").onclick = exportCSV;
  document.getElementById("exportJsonBtn").onclick = exportJSON;
  document.getElementById("importJsonBtn").onclick = () => document.getElementById("importFile").click();
  document.getElementById("importFile").onchange = e => { const file = e.target.files[0]; if (!file) return;
    const r = new FileReader(); r.onload = () => { try { const d = JSON.parse(r.result);
      if (Array.isArray(d)) { importJSON(d); menu.classList.remove("show"); } else alert("Not a valid backup file."); }
      catch(err){ alert("Could not read file."); } }; r.readAsText(file); };

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") { closeModal(); closeManage(); menu.classList.remove("show"); document.getElementById("verOverlay").classList.remove("show"); }
    if (e.key === "Enter" && modalOpen && e.target.tagName !== "TEXTAREA" && e.target.tagName !== "INPUT") saveModal();
  });
}
init();
</script>
