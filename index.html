<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SmarterPaw Channel Planner</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel-2: #1e222b; --line: #2a2f3a;
    --text: #e8eaf0; --muted: #9aa3b2; --accent: #6d5dfc;
    --meowi: #6d5dfc; --doggi: #f5a524; --kitty: #ec4899;
    --backlog: #6b7280; --progress: #3b82f6; --review: #a855f7; --scheduled: #f59e0b; --live: #22c55e;
    --danger: #ef4444; --ok: #22c55e;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { background: var(--bg); color: var(--text);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  header { padding: 14px 20px; background: var(--panel); border-bottom: 1px solid var(--line);
    display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
  .brand-title { font-size: 17px; font-weight: 700; letter-spacing: .2px; }
  .brand-title span { color: var(--accent); }
  .status-dot { display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); margin-right:auto; }
  .status-dot .d { width:9px; height:9px; border-radius:50%; background:var(--muted); }
  .status-dot.live .d { background: var(--ok); box-shadow:0 0 6px var(--ok); }
  .status-dot.local .d { background: var(--scheduled); }
  .toolbar, .filters { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  button { font: inherit; cursor: pointer; border: 1px solid var(--line); background: var(--panel-2);
    color: var(--text); padding: 7px 12px; border-radius: 8px; transition: .12s; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  button.ghost { background: transparent; }
  input, select, textarea { font: inherit; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px; padding: 7px 10px; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  .chip { border: 1px solid var(--line); background: var(--panel-2); padding: 5px 11px; border-radius: 999px;
    font-size: 12px; cursor: pointer; user-select: none; display: inline-flex; gap: 6px; align-items: center; }
  .chip .dot { width: 9px; height: 9px; border-radius: 50%; }
  .chip.off { opacity: .4; }
  .search { min-width: 160px; }

  .board { flex: 1; display: flex; gap: 14px; padding: 16px 20px; overflow-x: auto; align-items: flex-start; }
  .col { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    width: 300px; min-width: 300px; max-height: 100%; display: flex; flex-direction: column; }
  .col-head { padding: 12px 14px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--line); }
  .col-head .bar { width: 4px; height: 16px; border-radius: 3px; }
  .col-head h2 { font-size: 13px; margin: 0; font-weight: 700; letter-spacing: .3px; text-transform: uppercase; }
  .col-head .count { margin-left: auto; background: var(--panel-2); color: var(--muted);
    border-radius: 999px; padding: 1px 9px; font-size: 12px; font-weight: 600; }
  .col-body { padding: 10px; overflow-y: auto; flex: 1; min-height: 60px; display: flex; flex-direction: column; gap: 10px; }
  .col-body.drag-over { background: rgba(109,93,252,.08); }
  .card { background: var(--panel-2); border: 1px solid var(--line); border-left-width: 4px;
    border-radius: 10px; padding: 11px 12px; cursor: grab; position: relative; }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: .4; }
  .card .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 7px; }
  .pill { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; color: #fff; }
  .pill.channel { background: var(--panel); color: var(--muted); border: 1px solid var(--line); }
  .card h3 { margin: 0 0 6px; font-size: 14px; font-weight: 600; line-height: 1.3; }
  .card .meta { display: flex; gap: 10px; align-items: center; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
  .card .meta .due.overdue { color: var(--danger); font-weight: 700; }
  .card .notes { margin-top: 7px; font-size: 12px; color: var(--muted); white-space: pre-wrap;
    overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .empty { color: var(--muted); font-size: 12px; text-align: center; padding: 18px 6px; border: 1px dashed var(--line); border-radius: 8px; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; align-items: center; justify-content: center; z-index: 50; }
  .overlay.show { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; width: 460px; max-width: 92vw; max-height: 90vh; overflow-y: auto; padding: 20px; }
  .modal h2 { margin: 0 0 16px; font-size: 16px; }
  .field { margin-bottom: 13px; }
  .field label, .seclabel { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 600; }
  .seclabel { text-transform: uppercase; letter-spacing: .3px; margin-bottom: 8px; }
  .field input, .field select, .field textarea { width: 100%; }
  .field textarea { resize: vertical; min-height: 64px; }
  .row2 { display: flex; gap: 12px; } .row2 > .field { flex: 1; }
  .ch-wrap { display: flex; gap: 6px; }
  .ch-wrap select { flex: 1; }
  .ch-wrap button { padding: 7px 11px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; } .modal-actions .spacer { flex: 1; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 14px; }
  .owner-chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .owner-chip { cursor: pointer; border: 1px solid var(--line); background: var(--panel-2); border-radius: 999px;
    padding: 5px 12px; font-size: 12px; user-select: none; }
  .owner-chip.sel { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .owner-chip.add { border-style: dashed; color: var(--muted); }
  .owner-chips .none { color: var(--muted); font-size: 12px; }
  .manage-sec { margin-bottom: 18px; }
  .manage-list { display: flex; flex-direction: column; gap: 6px; }
  .manage-row { display: flex; align-items: center; justify-content: space-between; gap: 8px;
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; padding: 6px 8px 6px 12px; }
  .manage-row button { padding: 2px 9px; color: var(--danger); border-color: transparent; background: transparent; }
  .manage-row button:hover { border-color: var(--danger); }
  .add-row { display: flex; gap: 8px; margin-top: 9px; } .add-row input { flex: 1; }
  .toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); background: var(--danger);
    color: #fff; padding: 9px 16px; border-radius: 8px; font-size: 13px; z-index: 80; display: none; max-width: 90vw; }
  ::-webkit-scrollbar { height: 10px; width: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 6px; }
</style>
</head>
<body>
<header>
  <div class="brand-title">Smarter<span>Paw</span> · Channel Planner</div>
  <div class="status-dot" id="syncStatus"><span class="d"></span><span class="t">…</span></div>
  <div class="filters" id="brandFilters"></div>
  <div class="filters">
    <select id="channelFilter"><option value="">All channels</option></select>
    <input class="search" id="search" placeholder="Search…" />
  </div>
  <div class="toolbar">
    <button class="primary" id="addBtn">+ Deliverable</button>
    <button id="manageBtn">⚙ Manage</button>
    <button id="xlsxBtn">Export Excel</button>
    <button class="ghost" id="menuBtn">⋯</button>
  </div>
</header>

<div class="board" id="board"></div>

<!-- Add / Edit deliverable -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">New deliverable</h2>
    <input type="hidden" id="f_id" />
    <div class="field"><label>Title</label><input id="f_title" placeholder="e.g. July sale carousel" /></div>
    <div class="row2">
      <div class="field"><label>Brand</label><select id="f_brand"></select></div>
      <div class="field"><label>Channel</label>
        <div class="ch-wrap"><select id="f_channel"></select><button id="f_channelAdd" title="Add a channel">＋</button></div>
      </div>
    </div>
    <div class="field"><label>Owners</label><div class="owner-chips" id="f_owners"></div></div>
    <div class="row2">
      <div class="field"><label>Due date</label><input id="f_due" type="date" /></div>
      <div class="field"><label>Status</label><select id="f_status"></select></div>
    </div>
    <div class="field"><label>Notes</label><textarea id="f_notes" placeholder="Brief, links, copy direction…"></textarea></div>
    <div class="modal-actions">
      <button class="ghost" id="deleteBtn" style="color:var(--danger);border-color:var(--danger)">Delete</button>
      <div class="spacer"></div>
      <button id="cancelBtn">Cancel</button>
      <button class="primary" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<!-- Manage channels & people -->
<div class="overlay" id="manageOverlay">
  <div class="modal">
    <h2>Manage channels &amp; people</h2>
    <div class="manage-sec">
      <span class="seclabel">Channels</span>
      <div class="manage-list" id="manageChannels"></div>
      <div class="add-row"><input id="mAddChannel" placeholder="New channel…" /><button class="primary" id="mAddChannelBtn">Add</button></div>
    </div>
    <div class="manage-sec">
      <span class="seclabel">People</span>
      <div class="manage-list" id="managePeople"></div>
      <div class="add-row"><input id="mAddPerson" placeholder="New person…" /><button class="primary" id="mAddPersonBtn">Add</button></div>
    </div>
    <div class="modal-actions"><div class="spacer"></div><button id="manageClose">Done</button></div>
    <div class="hint">Removing an item won't change cards that already use it — they keep the name.</div>
  </div>
</div>

<!-- Data & backup -->
<div class="overlay" id="menuOverlay">
  <div class="modal" style="width:360px">
    <h2>Data &amp; backup</h2>
    <div class="field"><button id="exportJsonBtn" style="width:100%">⬇ Export backup (.json)</button></div>
    <div class="field"><button id="importJsonBtn" style="width:100%">⬆ Import backup (.json)</button></div>
    <div class="field"><button id="csvBtn" style="width:100%">Export CSV</button></div>
    <input type="file" id="importFile" accept="application/json" style="display:none" />
    <div class="modal-actions"><div class="spacer"></div><button id="menuClose">Close</button></div>
    <div class="hint" id="menuHint"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
<script>
"use strict";
const BRANDS = [{ name: "Meowi" }, { name: "Doggi" }, { name: "Kitty" }];
const BRAND_HEX = { Meowi: "#6d5dfc", Doggi: "#f5a524", Kitty: "#ec4899" };
const DEFAULT_CHANNELS = ["Organic Social", "Email", "Meta Campaigns", "Web / Landing"];
const DEFAULT_PEOPLE = ["Jason", "Brennan"];
const STATUSES = [
  { key: "Backlog", color: "var(--backlog)" }, { key: "In Progress", color: "var(--progress)" },
  { key: "Review", color: "var(--review)" }, { key: "Scheduled", color: "var(--scheduled)" }, { key: "Live", color: "var(--live)" },
];
const STORE_KEY = "smarterpaw-planner-v1";
const LIST_KEY = "smarterpaw-planner-lists-v1";

const CFG = window.PLANNER_CONFIG || {};
const ONLINE = !!(CFG.url && CFG.anonKey && window.supabase);
const db = ONLINE ? window.supabase.createClient(CFG.url, CFG.anonKey) : null;

let cards = [];
let channelsList = [];   // [{id?, name}]
let peopleList = [];     // [{id?, name}]
let activeBrands = new Set(BRANDS.map(b => b.name));
let channelFilter = "", searchText = "";
let modalOpen = false, manageOpen = false, _listsWarned = false;
let modalOwners = new Set();
let _idc = Date.now();
function uid() { return "c" + (_idc++).toString(36); }
function toast(msg) { const t = document.getElementById("toast"); t.textContent = msg; t.style.display = "block"; setTimeout(() => t.style.display = "none", 3500); }

/* ---------- deliverables data ---------- */
function loadLocal() { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || sampleData(); } catch (e) { return sampleData(); } }
function saveLocal() { localStorage.setItem(STORE_KEY, JSON.stringify(cards)); }
async function refetch() {
  if (!ONLINE) { cards = loadLocal(); render(); return; }
  const { data, error } = await db.from("deliverables").select("*").order("created_at", { ascending: true });
  if (error) { toast("Load failed: " + error.message); return; }
  cards = data.map(r => ({ id: r.id, title: r.title, brand: r.brand, channel: r.channel,
    owner: r.owner || "", due: r.due || "", status: r.status, notes: r.notes || "" }));
  render();
}
function dbObj(d) { return { title: d.title, brand: d.brand, channel: d.channel, owner: d.owner || "",
  due: d.due || null, status: d.status, notes: d.notes || "" }; }
async function createCard(d) {
  if (!ONLINE) { cards.push(Object.assign({ id: uid() }, d)); saveLocal(); render(); return; }
  const { error } = await db.from("deliverables").insert(dbObj(d));
  if (error) toast("Save failed: " + error.message); else refetch();
}
async function updateCard(id, d) {
  if (!ONLINE) { Object.assign(cards.find(c => c.id === id), d); saveLocal(); render(); return; }
  const { error } = await db.from("deliverables").update(dbObj(d)).eq("id", id);
  if (error) toast("Update failed: " + error.message); else refetch();
}
async function patchStatus(id, status) {
  if (!ONLINE) { cards.find(c => c.id === id).status = status; saveLocal(); render(); return; }
  const { error } = await db.from("deliverables").update({ status }).eq("id", id);
  if (error) toast("Update failed: " + error.message); else refetch();
}
async function removeCard(id) {
  if (!ONLINE) { cards = cards.filter(c => c.id !== id); saveLocal(); render(); return; }
  const { error } = await db.from("deliverables").delete().eq("id", id);
  if (error) toast("Delete failed: " + error.message); else refetch();
}
function sampleData() {
  return [
    { id: uid(), title: "July sale teaser reels (3x)", brand: "Meowi", channel: "Organic Social", owner: "Brennan", due: "", status: "Backlog", notes: "Hook on Super Zoomies. Vertical 9:16." },
    { id: uid(), title: "Prime Day price drop email", brand: "Meowi", channel: "Email", owner: "Jason", due: "", status: "In Progress", notes: "Klaviyo flow + one-off blast." },
    { id: uid(), title: "Doggi summer collection", brand: "Doggi", channel: "Meta Campaigns", owner: "", due: "", status: "Review", notes: "ABO test, 3 creatives." },
    { id: uid(), title: "Kitty refill landing page", brand: "Kitty", channel: "Web / Landing", owner: "Jason", due: "", status: "Scheduled", notes: "Promo banner + bundle upsell." },
    { id: uid(), title: "Doggi weekly grid posts", brand: "Doggi", channel: "Organic Social", owner: "Brennan", due: "", status: "Live", notes: "" },
  ];
}

/* ---------- channels & people lists ---------- */
function saveListsLocal() { localStorage.setItem(LIST_KEY, JSON.stringify({ channels: channelsList, people: peopleList })); }
async function loadLists() {
  if (!ONLINE) {
    const raw = JSON.parse(localStorage.getItem(LIST_KEY) || "null");
    if (raw && raw.channels) { channelsList = raw.channels; peopleList = raw.people || []; }
    else { channelsList = DEFAULT_CHANNELS.map(n => ({ name: n })); peopleList = DEFAULT_PEOPLE.map(n => ({ name: n })); saveListsLocal(); }
    return;
  }
  const { data, error } = await db.from("lists").select("*").order("position", { ascending: true });
  if (error) {
    channelsList = DEFAULT_CHANNELS.map(n => ({ name: n })); peopleList = DEFAULT_PEOPLE.map(n => ({ name: n }));
    if (!_listsWarned) { _listsWarned = true; toast("Channels/people not saved yet — run the lists SQL (0002) in Supabase."); }
    return;
  }
  channelsList = data.filter(r => r.kind === "channel").map(r => ({ id: r.id, name: r.name }));
  peopleList = data.filter(r => r.kind === "person").map(r => ({ id: r.id, name: r.name }));
  if (channelsList.length === 0) channelsList = DEFAULT_CHANNELS.map(n => ({ name: n }));
}
async function reloadListsAndUI() { await loadLists(); afterListsChanged(); }
function afterListsChanged() {
  buildChannelFilter(); buildChannelSelect();
  if (modalOpen) renderOwnerChips();
  if (manageOpen) renderManage();
}
async function addList(kind, name) {
  name = (name || "").trim(); if (!name) return false;
  const arr = kind === "channel" ? channelsList : peopleList;
  if (arr.some(x => x.name.toLowerCase() === name.toLowerCase())) { toast('"' + name + '" already exists'); return false; }
  if (!ONLINE) { arr.push({ name }); saveListsLocal(); afterListsChanged(); return true; }
  const { error } = await db.from("lists").insert({ kind, name, position: arr.length + 1 });
  if (error) { toast("Add failed: " + error.message); return false; }
  await reloadListsAndUI(); return true;
}
async function removeList(kind, item) {
  if (!confirm('Remove "' + item.name + '"? Cards already using it keep the name.')) return;
  if (!ONLINE) {
    if (kind === "channel") channelsList = channelsList.filter(x => x.name !== item.name);
    else peopleList = peopleList.filter(x => x.name !== item.name);
    saveListsLocal(); afterListsChanged(); return;
  }
  const { error } = await db.from("lists").delete().eq("id", item.id);
  if (error) toast("Remove failed: " + error.message); else reloadListsAndUI();
}

/* ---------- render board ---------- */
function isOverdue(c) { if (!c.due || c.status === "Live") return false; const t = new Date(); t.setHours(0,0,0,0); return new Date(c.due + "T00:00:00") < t; }
function fmtDue(d) { if (!d) return ""; return new Date(d + "T00:00:00").toLocaleDateString(undefined, { month: "short", day: "numeric" }); }
function esc(s) { return (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function visibleCards() {
  const q = searchText.trim().toLowerCase();
  return cards.filter(c => activeBrands.has(c.brand) && (!channelFilter || c.channel === channelFilter) &&
    (!q || (c.title + " " + (c.notes||"") + " " + (c.owner||"")).toLowerCase().includes(q)));
}
function render() {
  const board = document.getElementById("board"); board.innerHTML = "";
  const vis = visibleCards();
  STATUSES.forEach(st => {
    const col = document.createElement("div"); col.className = "col";
    const colCards = vis.filter(c => c.status === st.key);
    col.innerHTML = `<div class="col-head"><div class="bar" style="background:${st.color}"></div>` +
      `<h2>${st.key}</h2><span class="count">${colCards.length}</span></div><div class="col-body" data-status="${st.key}"></div>`;
    const body = col.querySelector(".col-body");
    if (colCards.length === 0) body.innerHTML = `<div class="empty">Drop here</div>`;
    else colCards.forEach(c => body.appendChild(cardEl(c)));
    body.addEventListener("dragover", e => { e.preventDefault(); body.classList.add("drag-over"); });
    body.addEventListener("dragleave", () => body.classList.remove("drag-over"));
    body.addEventListener("drop", e => { e.preventDefault(); body.classList.remove("drag-over");
      const id = e.dataTransfer.getData("text/plain"); const card = cards.find(c => c.id === id);
      if (card && card.status !== st.key) patchStatus(id, st.key); });
    board.appendChild(col);
  });
}
function cardEl(c) {
  const el = document.createElement("div"); el.className = "card";
  el.style.borderLeftColor = BRAND_HEX[c.brand] || "var(--line)"; el.draggable = true;
  const over = isOverdue(c);
  el.innerHTML = `<div class="tags"><span class="pill" style="background:${BRAND_HEX[c.brand]||'#555'}">${esc(c.brand)}</span>` +
    `<span class="pill channel">${esc(c.channel)}</span></div><h3>${esc(c.title)}</h3>` +
    `<div class="meta">${c.owner ? `<span>👤 ${esc(c.owner)}</span>` : ""}` +
    `${c.due ? `<span class="due ${over?'overdue':''}">📅 ${fmtDue(c.due)}${over?' · overdue':''}</span>` : ""}</div>` +
    (c.notes ? `<div class="notes">${esc(c.notes)}</div>` : "");
  el.addEventListener("click", () => openModal(c));
  el.addEventListener("dragstart", e => { e.dataTransfer.setData("text/plain", c.id); el.classList.add("dragging"); });
  el.addEventListener("dragend", () => el.classList.remove("dragging"));
  return el;
}

/* ---------- filters / selects ---------- */
function buildBrandFilters() {
  const bf = document.getElementById("brandFilters"); bf.innerHTML = "";
  BRANDS.forEach(b => { const chip = document.createElement("span"); chip.className = "chip" + (activeBrands.has(b.name) ? "" : " off");
    chip.innerHTML = `<span class="dot" style="background:${BRAND_HEX[b.name]}"></span>${b.name}`;
    chip.onclick = () => { if (activeBrands.has(b.name)) activeBrands.delete(b.name); else activeBrands.add(b.name);
      chip.classList.toggle("off", !activeBrands.has(b.name)); render(); };
    bf.appendChild(chip); });
}
function buildChannelFilter() {
  const cf = document.getElementById("channelFilter"); const cur = cf.value;
  cf.innerHTML = '<option value="">All channels</option>';
  channelsList.forEach(c => { const o = document.createElement("option"); o.value = c.name; o.textContent = c.name; cf.appendChild(o); });
  if (channelsList.some(c => c.name === cur)) cf.value = cur; else { cf.value = ""; channelFilter = ""; }
}
function buildChannelSelect() {
  const s = document.getElementById("f_channel"); const cur = s.value; s.innerHTML = "";
  channelsList.forEach(c => { const o = document.createElement("option"); o.value = c.name; o.textContent = c.name; s.appendChild(o); });
  if (channelsList.some(c => c.name === cur)) s.value = cur;
}
function fillStaticSelects() {
  const sb = document.getElementById("f_brand"); sb.innerHTML = "";
  BRANDS.forEach(b => { const o = document.createElement("option"); o.value = b.name; o.textContent = b.name; sb.appendChild(o); });
  const ss = document.getElementById("f_status"); ss.innerHTML = "";
  STATUSES.forEach(s => { const o = document.createElement("option"); o.value = s.key; o.textContent = s.key; ss.appendChild(o); });
}

/* ---------- owner chips ---------- */
function renderOwnerChips() {
  const box = document.getElementById("f_owners"); box.innerHTML = "";
  if (peopleList.length === 0) { const n = document.createElement("span"); n.className = "none"; n.textContent = "No people yet — add one →"; box.appendChild(n); }
  peopleList.forEach(p => {
    const chip = document.createElement("span");
    chip.className = "owner-chip" + (modalOwners.has(p.name) ? " sel" : "");
    chip.textContent = p.name;
    chip.onclick = () => { if (modalOwners.has(p.name)) modalOwners.delete(p.name); else modalOwners.add(p.name); renderOwnerChips(); };
    box.appendChild(chip);
  });
  const add = document.createElement("span"); add.className = "owner-chip add"; add.textContent = "＋ Person";
  add.onclick = async () => { const name = (prompt("New person name:") || "").trim(); if (!name) return;
    const ok = await addList("person", name); if (ok) { modalOwners.add(name); renderOwnerChips(); } };
  box.appendChild(add);
}

/* ---------- modal ---------- */
function openModal(card) {
  modalOpen = true;
  document.getElementById("modalTitle").textContent = card ? "Edit deliverable" : "New deliverable";
  document.getElementById("f_id").value = card ? card.id : "";
  document.getElementById("f_title").value = card ? card.title : "";
  document.getElementById("f_brand").value = card ? card.brand : BRANDS[0].name;
  buildChannelSelect();
  document.getElementById("f_channel").value = card ? card.channel : (channelsList[0] ? channelsList[0].name : "");
  modalOwners = new Set((card && card.owner ? card.owner.split(",") : []).map(s => s.trim()).filter(Boolean));
  renderOwnerChips();
  document.getElementById("f_due").value = card ? (card.due||"") : "";
  document.getElementById("f_status").value = card ? card.status : STATUSES[0].key;
  document.getElementById("f_notes").value = card ? (card.notes||"") : "";
  document.getElementById("deleteBtn").style.display = card ? "" : "none";
  document.getElementById("overlay").classList.add("show");
  document.getElementById("f_title").focus();
}
function closeModal() { modalOpen = false; document.getElementById("overlay").classList.remove("show"); }
function saveModal() {
  const id = document.getElementById("f_id").value;
  const title = document.getElementById("f_title").value.trim();
  if (!title) { document.getElementById("f_title").focus(); return; }
  const d = { title, brand: document.getElementById("f_brand").value, channel: document.getElementById("f_channel").value,
    owner: [...modalOwners].join(", "), due: document.getElementById("f_due").value,
    status: document.getElementById("f_status").value, notes: document.getElementById("f_notes").value.trim() };
  if (id) updateCard(id, d); else createCard(d);
  closeModal();
}
function deleteCard() { const id = document.getElementById("f_id").value; if (id && confirm("Delete this deliverable?")) { removeCard(id); closeModal(); } }

/* ---------- manage panel ---------- */
function renderManage() {
  const mc = document.getElementById("manageChannels"); mc.innerHTML = "";
  channelsList.forEach(c => mc.appendChild(manageRow("channel", c)));
  const mp = document.getElementById("managePeople"); mp.innerHTML = "";
  peopleList.forEach(p => mp.appendChild(manageRow("person", p)));
}
function manageRow(kind, item) {
  const row = document.createElement("div"); row.className = "manage-row";
  const span = document.createElement("span"); span.textContent = item.name;
  const btn = document.createElement("button"); btn.textContent = "Remove"; btn.onclick = () => removeList(kind, item);
  row.appendChild(span); row.appendChild(btn); return row;
}
function openManage() { manageOpen = true; renderManage(); document.getElementById("manageOverlay").classList.add("show"); }
function closeManage() { manageOpen = false; document.getElementById("manageOverlay").classList.remove("show"); }

/* ---------- exports ---------- */
function download(filename, blob) { const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = filename;
  document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(a.href), 1000); }
function exportCSV() {
  const cols = ["Brand","Channel","Title","Owners","Due","Status","Notes"]; const rows = [cols];
  cards.forEach(c => rows.push([c.brand, c.channel, c.title, c.owner||"", c.due||"", c.status, (c.notes||"").replace(/\n/g," ")]));
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")).join("\r\n");
  download("smarterpaw-planner.csv", new Blob([csv], { type: "text/csv" }));
}
function exportJSON() { download("smarterpaw-planner-backup.json", new Blob([JSON.stringify(cards,null,2)], { type: "application/json" })); }
function colLetter(n){ let s=""; n++; while(n>0){ const m=(n-1)%26; s=String.fromCharCode(65+m)+s; n=Math.floor((n-1)/26);} return s; }
function xmlEsc(s){ return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&apos;"}[c])); }
function sheetXml(rows){
  let body = "";
  rows.forEach((row, ri) => { let cells = "";
    row.forEach((val, ci) => { const ref = colLetter(ci) + (ri+1); const s = ri === 0 ? ' s="1"' : '';
      cells += `<c r="${ref}" t="inlineStr"${s}><is><t xml:space="preserve">${xmlEsc(val)}</t></is></c>`; });
    body += `<row r="${ri+1}">${cells}</row>`; });
  const last = colLetter(rows[0].length-1) + rows.length;
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">` +
    `<dimension ref="A1:${last}"/><sheetData>${body}</sheetData><autoFilter ref="A1:${colLetter(rows[0].length-1)}1"/></worksheet>`;
}
function buildXlsx(rows){
  const files = {
    "[Content_Types].xml": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/><Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/></Types>`,
    "_rels/.rels": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>`,
    "xl/workbook.xml": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="Deliverables" sheetId="1" r:id="rId1"/></sheets></workbook>`,
    "xl/_rels/workbook.xml.rels": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/></Relationships>`,
    "xl/styles.xml": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><fonts count="2"><font><sz val="11"/><name val="Calibri"/></font><font><b/><sz val="11"/><name val="Calibri"/></font></fonts><fills count="2"><fill><patternFill patternType="none"/></fill><fill><patternFill patternType="gray125"/></fill></fills><borders count="1"><border/></borders><cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs><cellXfs count="2"><xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/><xf numFmtId="0" fontId="1" fillId="0" borderId="0" xfId="0" applyFont="1"/></cellXfs></styleSheet>`,
    "xl/worksheets/sheet1.xml": sheetXml(rows),
  };
  return zipStore(files);
}
const CRC_TABLE = (() => { const t = new Uint32Array(256); for (let n=0;n<256;n++){ let c=n; for(let k=0;k<8;k++) c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1); t[n]=c>>>0;} return t; })();
function crc32(b){ let c=0xFFFFFFFF; for(let i=0;i<b.length;i++) c=CRC_TABLE[(c^b[i])&0xFF]^(c>>>8); return (c^0xFFFFFFFF)>>>0; }
function zipStore(filesObj){
  const enc = new TextEncoder();
  const entries = Object.keys(filesObj).map(name => { const data = enc.encode(filesObj[name]); return { nameBytes: enc.encode(name), data, crc: crc32(data) }; });
  const chunks = []; let offset = 0; const central = [];
  const u16 = n => [n&0xFF,(n>>8)&0xFF]; const u32 = n => [n&0xFF,(n>>8)&0xFF,(n>>16)&0xFF,(n>>24)&0xFF];
  entries.forEach(e => { const hb = new Uint8Array([].concat(u32(0x04034b50),u16(20),u16(0),u16(0),u16(0),u16(0),u32(e.crc),u32(e.data.length),u32(e.data.length),u16(e.nameBytes.length),u16(0)));
    chunks.push(hb, e.nameBytes, e.data); central.push({ e, offset }); offset += hb.length + e.nameBytes.length + e.data.length; });
  const cdStart = offset; const cdChunks = [];
  central.forEach(({e, offset}) => { const cb = new Uint8Array([].concat(u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(e.crc),u32(e.data.length),u32(e.data.length),u16(e.nameBytes.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset))); cdChunks.push(cb, e.nameBytes); });
  let cdSize = 0; cdChunks.forEach(c => cdSize += c.length);
  const eocd = new Uint8Array([].concat(u32(0x06054b50),u16(0),u16(0),u16(entries.length),u16(entries.length),u32(cdSize),u32(cdStart),u16(0)));
  const all = [...chunks, ...cdChunks, eocd]; let total = 0; all.forEach(c => total += c.length);
  const out = new Uint8Array(total); let p = 0; all.forEach(c => { out.set(c, p); p += c.length; }); return out;
}
function exportXLSX(){
  const cols = ["Brand","Channel","Title","Owners","Due","Status","Notes"]; const rows = [cols];
  const order = {}; STATUSES.forEach((s,i)=>order[s.key]=i);
  [...cards].sort((a,b)=> a.brand.localeCompare(b.brand) || (order[a.status]-order[b.status]) || a.channel.localeCompare(b.channel))
    .forEach(c => rows.push([c.brand, c.channel, c.title, c.owner||"", c.due||"", c.status, (c.notes||"").replace(/\n/g," ")]));
  download("smarterpaw-planner.xlsx", new Blob([buildXlsx(rows)], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" }));
}

/* ---------- import ---------- */
async function importJSON(arr) {
  if (!ONLINE) { cards = arr; saveLocal(); render(); return; }
  const { error } = await db.from("deliverables").insert(arr.map(dbObj));
  if (error) toast("Import failed: " + error.message); else refetch();
}

/* ---------- init ---------- */
function setSyncUI() {
  const el = document.getElementById("syncStatus");
  if (ONLINE) { el.classList.add("live"); el.querySelector(".t").textContent = "Live · synced"; }
  else { el.classList.add("local"); el.querySelector(".t").textContent = "Local only (not connected)"; }
  document.getElementById("menuHint").textContent = ONLINE
    ? "Connected to Supabase. Changes sync live across everyone with the board open."
    : "Not connected — saving to this browser only.";
}
async function init() {
  fillStaticSelects();
  await loadLists();
  buildBrandFilters(); buildChannelFilter(); buildChannelSelect();
  setSyncUI();
  await refetch();

  if (ONLINE) {
    db.channel("planner-deliverables").on("postgres_changes", { event: "*", schema: "public", table: "deliverables" }, refetch).subscribe();
    db.channel("planner-lists").on("postgres_changes", { event: "*", schema: "public", table: "lists" }, reloadListsAndUI).subscribe();
  }

  document.getElementById("channelFilter").onchange = e => { channelFilter = e.target.value; render(); };
  document.getElementById("search").oninput = e => { searchText = e.target.value; render(); };

  document.getElementById("addBtn").onclick = () => openModal(null);
  document.getElementById("saveBtn").onclick = saveModal;
  document.getElementById("cancelBtn").onclick = closeModal;
  document.getElementById("deleteBtn").onclick = deleteCard;
  document.getElementById("overlay").onclick = e => { if (e.target.id === "overlay") closeModal(); };
  document.getElementById("f_channelAdd").onclick = async () => {
    const name = (prompt("New channel name:") || "").trim(); if (!name) return;
    const ok = await addList("channel", name); if (ok) document.getElementById("f_channel").value = name;
  };
  document.getElementById("xlsxBtn").onclick = exportXLSX;

  document.getElementById("manageBtn").onclick = openManage;
  document.getElementById("manageClose").onclick = closeManage;
  document.getElementById("manageOverlay").onclick = e => { if (e.target.id === "manageOverlay") closeManage(); };
  const addCh = () => { const i = document.getElementById("mAddChannel"); addList("channel", i.value).then(ok => { if (ok) i.value = ""; }); };
  const addPe = () => { const i = document.getElementById("mAddPerson"); addList("person", i.value).then(ok => { if (ok) i.value = ""; }); };
  document.getElementById("mAddChannelBtn").onclick = addCh;
  document.getElementById("mAddPersonBtn").onclick = addPe;
  document.getElementById("mAddChannel").addEventListener("keydown", e => { if (e.key === "Enter") addCh(); });
  document.getElementById("mAddPerson").addEventListener("keydown", e => { if (e.key === "Enter") addPe(); });

  const menu = document.getElementById("menuOverlay");
  document.getElementById("menuBtn").onclick = () => menu.classList.add("show");
  document.getElementById("menuClose").onclick = () => menu.classList.remove("show");
  menu.onclick = e => { if (e.target.id === "menuOverlay") menu.classList.remove("show"); };
  document.getElementById("csvBtn").onclick = exportCSV;
  document.getElementById("exportJsonBtn").onclick = exportJSON;
  document.getElementById("importJsonBtn").onclick = () => document.getElementById("importFile").click();
  document.getElementById("importFile").onchange = e => { const file = e.target.files[0]; if (!file) return;
    const r = new FileReader(); r.onload = () => { try { const d = JSON.parse(r.result);
      if (Array.isArray(d)) { importJSON(d); menu.classList.remove("show"); } else alert("Not a valid backup file."); }
      catch(err){ alert("Could not read file."); } }; r.readAsText(file); };

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") { closeModal(); closeManage(); menu.classList.remove("show"); }
    if (e.key === "Enter" && modalOpen && e.target.tagName !== "TEXTAREA" && e.target.tagName !== "INPUT") saveModal();
  });
}
init();
</script>
